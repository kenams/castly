name: Castly Prospection

on:
  schedule:
    - cron: "0 9 * * 1-5"   # Lun-Ven 9h UTC (11h Paris)
  workflow_dispatch:
    inputs:
      scrape_only:
        description: "Scraper uniquement (sans envoi email)"
        required: false
        default: "false"

jobs:
  prospect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          pip install playwright
          playwright install chromium

      - name: Restore CSV cache
        uses: actions/cache@v4
        with:
          path: |
            prospection/agencies.csv
            prospection/artists.csv
            prospection/sent.csv
          key: castly-leads-${{ github.run_id }}
          restore-keys: castly-leads-

      - name: Scrape agences
        working-directory: prospection
        run: python scrape_agencies.py

      - name: Scrape artistes
        working-directory: prospection
        run: python scrape_artists.py

      - name: Envoyer emails
        if: ${{ github.event.inputs.scrape_only != 'true' }}
        working-directory: prospection
        env:
          BREVO_SMTP_USER: ${{ secrets.BREVO_SMTP_USER }}
          BREVO_SMTP_PASS: ${{ secrets.BREVO_SMTP_PASS }}
        run: python prospect_castly.py

      - name: Save CSV cache
        uses: actions/cache@v4
        with:
          path: |
            prospection/agencies.csv
            prospection/artists.csv
            prospection/sent.csv
          key: castly-leads-${{ github.run_id }}
